name: Build ehpk

on:
  push:
    branches: [main]
    paths:
      - 'apps/glasses/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build-ehpk.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch offline voice model
        run: pnpm --filter @notion-ub/glasses fetch:voice-model

      - name: Build .ehpk
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: pnpm --filter @notion-ub/glasses run pack

      - name: Upload .ehpk artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: notion-ultimate-brain-even-g2-ehpk
          path: apps/glasses/notion-ultimate-brain-even-g2.ehpk
          retention-days: 30
