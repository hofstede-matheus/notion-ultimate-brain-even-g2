name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'terraform/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-lambda.yml'

permissions:
  contents: read
  id-token: write # required to mint the OIDC token for AWS role assumption

# Terraform Cloud serializes applies against the same workspace anyway, but
# this avoids burning CI minutes on a run that's guaranteed to queue/fail on
# the state lock, and keeps dist-lambda builds from interleaving.
concurrency:
  group: deploy-lambda
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda bundle
        run: npm run build:lambda

      # No AWS access keys anywhere — GitHub mints a short-lived OIDC token
      # for this exact repo+branch (see terraform/github-oidc.tf's trust
      # policy), which this action exchanges for temporary STS credentials
      # scoped to the narrow IAM policy on that role. Nothing long-lived to
      # leak, and the action masks the resulting credentials in logs.
      - name: Assume AWS deploy role via OIDC
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Confirm assumed identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_notion_api_key: ${{ secrets.NOTION_API_KEY }}
          TF_VAR_notion_tasks_db: ${{ secrets.NOTION_TASKS_DB }}
          TF_VAR_notion_notes_db: ${{ secrets.NOTION_NOTES_DB }}
          TF_VAR_notion_projects_db: ${{ secrets.NOTION_PROJECTS_DB }}
          TF_VAR_notion_tags_db: ${{ secrets.NOTION_TAGS_DB }}
        run: terraform apply -input=false -auto-approve
